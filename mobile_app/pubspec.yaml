name: folony_kasir_mobile
description: Android client for Folony Kasir POS.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  flutter_image_compress: ^2.4.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  path_provider: ^2.1.5
  pdf: ^3.11.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/folony_logo.png
